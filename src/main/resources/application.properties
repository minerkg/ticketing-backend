spring.application.name=ticketing

spring.datasource.url=${TICKETING_DB_URL}
spring.datasource.password=${TICKETING_DB_PASS}
spring.datasource.username=${TICKETING_DB_USER}

server.servlet.context-path=/api-v1

logging.level.org.springframework.security=DEBUG

spring.jpa.hibernate.ddl-auto=validate

#spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
#spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=V1__init.sql
#spring.jpa.properties.jakarta.persistence.schema-generation.create-source=metadata
#spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-source=metadata


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
