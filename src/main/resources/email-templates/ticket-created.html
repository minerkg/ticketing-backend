<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ticket Created</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f8f9fa; padding:20px;">
<table width="100%" style="max-width:600px; margin:auto; background:white; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1);">
    <tr>
        <td style="padding:20px; text-align:center; background:#007bff; color:white; border-radius:8px 8px 0 0;">
            <h2 style="margin:0;">🎫 New Ticket Created</h2>
        </td>
    </tr>
    <tr>
        <td style="padding:20px; color:#333;">
            <p>Hello,</p>
            <p><strong>${text}</strong></p>
            <p>Created on: <em>${date-time}</em></p>
            <p>We will get back to you as soon as possible.</p>
        </td>
    </tr>
    <tr>
        <td style="padding:15px; text-align:center; font-size:12px; color:#888; background:#f1f1f1; border-radius:0 0 8px 8px;">
            This is an automated message from the Support System.
        </td>
    </tr>
</table>
</body>
</html>
