<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ticket Assigned</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f4f6f9; padding:20px;">
<table width="100%" style="max-width:600px; margin:auto; background:white; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.08);">

    <!-- Header -->
    <tr>
        <td style="padding:20px; text-align:center; background:#17a2b8; color:white; border-radius:8px 8px 0 0;">
            <h2 style="margin:0;">Ticket Assigned</h2>
        </td>
    </tr>

    <!-- Body -->
    <tr>
        <td style="padding:20px; color:#333;">
            <p>Hello <strong>${agent-name}</strong>,</p>
            <p>A new ticket has been assigned to you:</p>
            <table width="100%" style="margin:15px 0; border:1px solid #ddd; border-radius:6px; background:#fafafa;">
                <tr>
                    <td style="padding:10px; font-weight:bold; width:120px;">Ticket ID:</td>
                    <td style="padding:10px;">${ticket-id}</td>
                </tr>
                <tr style="background:#fefefe;">
                    <td style="padding:10px; font-weight:bold;">Created:</td>
                    <td style="padding:10px;">${date-time}</td>
                </tr>
                <tr>
                    <td style="padding:10px; font-weight:bold;">Summary:</td>
                    <td style="padding:10px;">${ticket-summary}</td>
                </tr>
            </table>
            <p>Please review and take action as soon as possible.</p>
        </td>
    </tr>

    <!-- Footer -->
    <tr>
        <td style="padding:15px; text-align:center; font-size:12px; color:#777; background:#f1f1f1; border-radius:0 0 8px 8px;">
            This ticket was assigned by the admin or your supervisor.
        </td>
    </tr>
</table>
</body>
</html>
